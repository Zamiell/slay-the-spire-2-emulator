name: ty

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  ty:
    name: ty
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Set up uv
        uses: astral-sh/setup-uv@v8

      - name: Run ty
        run: uvx ty check .
